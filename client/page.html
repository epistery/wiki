<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki</title>
  <link rel="stylesheet" href="/style/static.css">
  <link rel="stylesheet" href="/agent/epistery/wiki/client/wiki.css">
  <script src="/script/common.js"></script>
  <style>
    .wiki-main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    .wiki-header-bar {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacer) var(--spacer2);
      padding-left: 52px; /* space for floating nav icon */
      border-bottom: 1px solid var(--page-border);
      background: var(--bg-color);
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
    }

    .wiki-body-tray {
      overflow-y:auto;
      padding: var(--spacer2);
    }

    .wiki-body {
      max-width: 800px;
      margin: 0 auto;
    }
    .wiki-header-actions {
      display: flex;
      gap: var(--spacerhalf);
      align-items: center;
    }

    .btn {
      padding: var(--spacerhalf) var(--spacer);
      border: 1px solid var(--page-border);
      border-radius: 4px;
      background: var(--bg-color);
      cursor: pointer;
      text-decoration: none;
      color: var(--text-color);
      font-size: 0.875em;
    }

    .btn:hover {
      background: var(--bg-color-d);
    }

    .btn-primary {
      background: var(--rust-mid);
      color: white;
      border-color: var(--rust-mid);
    }

    .btn-primary:hover {
      background: var(--rust-deep);
    }

    .wiki-meta {
      margin-top: var(--spacer2);
      padding-top: var(--spacer);
      border-top: 1px solid var(--page-border);
      font-size: 0.875em;
      color: var(--text-color-quiet);
    }

    .wiki-breadcrumb {
      font-size: 0.9em;
      color: var(--text-color-quiet);
      display: flex;
      align-items: center;
      gap: var(--spacerhalf);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .wiki-breadcrumb a {
      color: var(--text-color-quiet);
      text-decoration: none;
    }

    .wiki-breadcrumb a:hover {
      color: var(--rust-mid);
      text-decoration: underline;
    }

    .wiki-breadcrumb-sep {
      color: var(--text-color-quiet);
    }
    /* Editor styles */
    .wiki-editor {
      display: none;
    }

    .wiki-editor.active {
      display: block;
    }

    .wiki-viewer.hidden {
      display: none;
    }

    .wiki-editor textarea {
      width: 100%;
      min-height: 500px;
      padding: var(--spacer);
      font-family: 'Courier New', monospace;
      font-size: 14px;
      border: 1px solid var(--page-border);
      border-radius: 4px;
      resize: vertical;
      background: var(--bg-color);
      color: var(--text-color);
    }

    #edit-body-ace {
      width: 100%;
      min-height: 500px;
      border: 1px solid var(--page-border);
      border-radius: 4px;
      font-size: 14px;
    }

    #edit-body-ace .ace_gutter {
      background: var(--bg-color-d);
    }

    .wiki-editor-toolbar {
      display: flex;
      gap: var(--spacer);
      margin-bottom: var(--spacer);
      align-items: center;
    }

    .wiki-editor-toolbar input,
    .wiki-editor-toolbar select {
      padding: var(--spacerhalf);
      font-size: 1em;
      border: 1px solid var(--page-border);
      border-radius: 4px;
      background: var(--bg-color);
      color: var(--text-color);
    }

    .wiki-editor-toolbar input {
      flex: 1;
    }

    .error {
      background: #ffe6e6;
      color: var(--status-error);
      padding: var(--spacer);
      border-radius: 4px;
      margin-bottom: var(--spacer);
      border: 1px solid var(--status-error);
    }

    .loading {
      text-align: center;
      padding: var(--spacer2);
      color: var(--text-color-quiet);
    }

    /* Sidebar index */
    .wiki-index ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .wiki-index li {
      margin: 0;
      padding: 0;
    }

    .wiki-index-item {
      display: flex;
      align-items: center;
      padding: var(--spacerthird) 0;
    }

    .wiki-index-toggle {
      width: 20px;
      height: 20px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
      margin-right: var(--spacerthird);
      font-size: 0.75em;
      color: var(--text-color-quiet);
      flex-shrink: 0;
    }

    .wiki-index-toggle:hover {
      color: var(--rust-mid);
    }

    .wiki-index-toggle.empty {
      visibility: hidden;
    }

    .wiki-index-link {
      color: var(--text-color);
      text-decoration: none;
      flex: 1;
      padding: var(--spacerthird) var(--spacerhalf);
      border-radius: 3px;
      font-size: 0.9em;
    }

    .wiki-index-link:hover {
      background: var(--bg-color-d);
      color: var(--rust-mid);
    }

    .wiki-index-link.active {
      background: var(--rust-light);
      color: white;
      font-weight: 500;
    }

    .wiki-index-children {
      margin-left: 1em;
      padding-left: 0.5em;
      border-left: 2px solid #ddd;
      display: none;
    }

    .wiki-index-children.expanded {
      display: block;
    }

    #modified-tag {
      color: inherit;
      text-decoration: none;
    }

    /* Wiki index styling when in hamburger menu */
    #side-bar .wiki-index {
      margin-top: var(--spacer2);
      padding-top: var(--spacer2);
      border-top: 1px solid var(--page-border);
    }
    .wiki-access {
      margin-bottom: var(--spacer);
    }
    @media (max-width: 768px) {
      .wiki-breadcrumb {
        display: none;
      }
    }
    @media print {
      header, .console-sidebar, .wiki-index, .wiki-header-bar, nav, footer { display: none !important; }
      body { height: auto !important; overflow: visible !important; }
      .console-layout { display: block !important; overflow: visible !important; height: auto !important; }
      .console-main, .wiki-main { overflow: visible !important; height: auto !important; padding: 0; }
      .wiki-body-tray { overflow: visible !important; height: auto !important; padding: 0; }
    }

    /* File picker modal */
    .fp-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .fp-overlay.active {
      display: flex;
    }
    .fp-modal {
      background: var(--bg-color);
      border: 1px solid var(--page-border);
      border-radius: 8px;
      width: 640px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }
    .fp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--spacer) var(--spacer2);
      border-bottom: 1px solid var(--page-border);
      flex-shrink: 0;
    }
    .fp-header h3 {
      margin: 0;
      font-size: 1.1rem;
      border: none;
    }
    .fp-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-color-quiet);
      padding: 0 4px;
    }
    .fp-close:hover { color: var(--rust-mid); }
    .fp-breadcrumb {
      padding: var(--spacerhalf) var(--spacer2);
      font-size: 0.85em;
      color: var(--text-color-quiet);
      border-bottom: 1px solid var(--page-border);
      flex-shrink: 0;
    }
    .fp-breadcrumb a {
      color: var(--text-color-quiet);
      text-decoration: none;
      cursor: pointer;
    }
    .fp-breadcrumb a:hover { color: var(--rust-mid); text-decoration: underline; }
    .fp-body {
      flex: 1;
      overflow-y: auto;
      padding: var(--spacer);
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacerhalf);
      align-content: flex-start;
    }
    .fp-item {
      width: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--spacerhalf);
      border: 2px solid transparent;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
    }
    .fp-item:hover { background: var(--bg-color-d); }
    .fp-item.selected { border-color: var(--rust-mid); background: var(--bg-color-d); }
    .fp-item.disabled { opacity: 0.35; cursor: default; }
    .fp-item-thumb {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 4px;
      background: var(--bg-color-d);
    }
    .fp-item-thumb img {
      max-width: 100%;
      max-height: 100%;
      object-fit: cover;
    }
    .fp-item-thumb .fp-icon {
      font-size: 2.5rem;
      color: var(--text-color-quiet);
    }
    .fp-item-name {
      margin-top: 4px;
      font-size: 0.75em;
      word-break: break-all;
      max-height: 2.6em;
      overflow: hidden;
      line-height: 1.3;
    }
    .fp-footer {
      display: flex;
      align-items: center;
      gap: var(--spacer);
      padding: var(--spacer) var(--spacer2);
      border-top: 1px solid var(--page-border);
      flex-shrink: 0;
    }
    .fp-footer select {
      padding: var(--spacerhalf);
      border: 1px solid var(--page-border);
      border-radius: 4px;
      background: var(--bg-color);
      color: var(--text-color);
      font-size: 0.85em;
    }
    .fp-selected-name {
      flex: 1;
      font-size: 0.85em;
      color: var(--text-color-quiet);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .fp-empty {
      width: 100%;
      text-align: center;
      padding: var(--spacer2);
      color: var(--text-color-quiet);
    }
  </style>
</head>
<body>
<header data-widget="header"></header>

<main class="console-layout">
  <div class="console-main wiki-main">
      <div class="wiki-header-bar">
        <div id="breadcrumb" class="wiki-breadcrumb"></div>
        <div class="wiki-header-actions">
          <button class="btn btn-primary" id="edit-btn-header" style="display: none;">Edit</button>
          <a id="admin-btn-header" href="/agent/epistery/wiki/admin" class="btn" style="display: none;">Admin</a>
        </div>
      </div>

      <div class="wiki-body-tray">
        <div class="wiki-body">
          <div id="error" class="error" style="display: none;"></div>

          <div id="loading" class="loading">Loading...</div>

          <div id="viewer" class="wiki-viewer" style="display: none;">
            <div class="wiki-content" id="doc-content"></div>
            <div class="wiki-meta" id="doc-meta"></div>
          </div>

          <div id="editor" class="wiki-editor">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--spacer2);">
              <h2>Editing: <span id="edit-doc-id"></span></h2>
              <div style="display: flex; gap: var(--spacerhalf);">
                <button class="btn" id="image-btn" title="Insert image">Image</button>
                <button class="btn" id="cancel-btn">Cancel</button>
                <button class="btn btn-primary" id="save-btn">Save</button>
              </div>
            </div>
            <div class="wiki-editor-toolbar">
              <input type="text" id="edit-title" placeholder="Document title">
              <select id="edit-parent">
                <option value="">(Root level)</option>
              </select>
              <select id="edit-visibility">
                <option value="public">Public</option>
                <option value="private">Private</option>
              </select>
            </div>
            <div id="edit-body-ace"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="console-sidebar">
      <div class="wiki-access" data-widget="requestAccess" data-agent="@epistery/wiki" data-list="epistery::editor"></div>
      <div class="wiki-index">
        <div id="index-tree"></div>
      </div>
    </div>
  </main>

  <!-- File picker modal -->
  <div class="fp-overlay" id="fp-overlay">
    <div class="fp-modal">
      <div class="fp-header">
        <h3>Insert Image</h3>
        <button class="fp-close" id="fp-close">&times;</button>
      </div>
      <div class="fp-breadcrumb" id="fp-breadcrumb">/</div>
      <div class="fp-body" id="fp-body"></div>
      <div class="fp-footer">
        <select id="fp-size">
          <option value="">Original</option>
          <option value="1200">Large (1200px)</option>
          <option value="800" selected>Medium (800px)</option>
          <option value="400">Small (400px)</option>
          <option value="200">Thumbnail (200px)</option>
        </select>
        <div class="fp-selected-name" id="fp-selected-name"></div>
        <button class="btn btn-primary" id="fp-insert-btn" disabled>Insert</button>
      </div>
    </div>
  </div>

  <script type="module">
    import ZebraTime from '/lib/zebratime.js'
    const API_BASE = '/agent/epistery/wiki';

    let currentDoc = null;
    let markupRenderer = null;
    let allDocs = [];
    let aceEditor = null;
    let aclLists = [];
    // window.epistery is set by common.js on every page load

    // Load ACE editor from CDN
    async function installAce() {
      if (typeof window.ace === 'undefined') {
        const aceScript = document.createElement('script');
        aceScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.6/ace.min.js';
        document.body.appendChild(aceScript);
        await new Promise((resolve) => {
          aceScript.addEventListener('load', resolve);
        });
      }
    }

    // Initialize ACE editor for markdown
    async function initAceEditor() {
      await installAce();

      if (!aceEditor) {
        aceEditor = window.ace.edit('edit-body-ace');
        aceEditor.setTheme('ace/theme/chrome');
        aceEditor.session.setMode('ace/mode/markdown');
        aceEditor.$blockScrolling = Infinity;
        aceEditor.session.setUseWrapMode(true);
        aceEditor.setOptions({
          maxLines: Infinity,
          minLines: 20,
          fontSize: '14px',
          showPrintMargin: false
        });
        aceEditor.renderer.setShowGutter(false);
      }

      return aceEditor;
    }

    // Initialize MarkUp renderer
    async function initMarkup() {
      if (!markupRenderer) {
        const MarkUp = await import(`${API_BASE}/client/MarkUp.mjs`).then(m => m.default);
        markupRenderer = new MarkUp({ basePath: API_BASE });
        await markupRenderer.init();
      }
      return markupRenderer;
    }

    // Load ACL list names for visibility dropdown
    async function loadAclLists() {
      try {
        const resp = await fetch(`${API_BASE}/acl-lists`);
        const data = await resp.json();
        aclLists = data.lists || [];
      } catch (err) {
        console.error('[wiki] Failed to load ACL lists:', err);
        aclLists = [];
      }
    }

    // Populate the visibility dropdown with current options
    function populateVisibilitySelector(currentValue) {
      const sel = document.getElementById('edit-visibility');
      sel.innerHTML = '';
      // Normalize legacy 'public' to 'default'
      const val = (currentValue === 'public' || !currentValue) ? 'default' : currentValue;
      // Fixed options
      const opts = [
        { value: 'default', label: 'Default' },
        { value: 'private', label: 'Private' }
      ];
      // Add ACL lists
      for (const name of aclLists) {
        opts.push({ value: name, label: `List: ${name}` });
      }
      // Check if current value is an unknown list
      const knownValues = new Set(opts.map(o => o.value));
      if (!knownValues.has(val)) {
        opts.push({ value: val, label: `${val} (list not found)` });
      }
      for (const opt of opts) {
        const el = document.createElement('option');
        el.value = opt.value;
        el.textContent = opt.label;
        sel.appendChild(el);
      }
      sel.value = val;
    }

    // Get doc ID from URL path
    function getDocId() {
      const path = window.location.pathname;
      const match = path.match(/\/agent\/epistery\/wiki\/(.+)/);
      return match ? decodeURIComponent(match[1]) : 'Home';
    }

    // Build and render the index tree
    function renderIndexTree() {
      const currentDocId = getDocId();

      // Build parent-child map: map parent ID to list of children
      const childrenMap = new Map();

      allDocs.forEach(doc => {
        const parentId = doc._pid || '';

        // Prevent self-reference: a doc cannot be its own parent
        if (parentId === doc._id) {
          console.warn(`[wiki] Document ${doc._id} has circular _pid reference (points to itself)`);
          return; // Skip this doc - treat as root
        }

        if (!childrenMap.has(parentId)) {
          childrenMap.set(parentId, []);
        }
        childrenMap.get(parentId).push(doc);
      });

      // Get all root documents (those with _pid === '' or no _pid)
      const rootDocs = childrenMap.get('') || [];

      // Render tree recursively with cycle detection
      function renderNode(doc, ancestors = new Set()) {
        // Detect cycles: if this doc is already in our ancestor chain, skip it
        if (ancestors.has(doc._id)) {
          console.warn(`[wiki] Circular reference detected in tree for ${doc._id}`);
          return null;
        }

        const children = childrenMap.get(doc._id) || [];
        const hasChildren = children.length > 0;
        const isActive = doc._id === currentDocId;

        const li = document.createElement('li');

        const itemDiv = document.createElement('div');
        itemDiv.className = 'wiki-index-item';

        // Toggle button
        const toggle = document.createElement('button');
        toggle.className = 'wiki-index-toggle' + (hasChildren ? '' : ' empty');
        toggle.textContent = hasChildren ? '▶' : '';
        toggle.setAttribute('aria-label', 'Toggle children');

        // Link
        const link = document.createElement('a');
        link.href = API_BASE + '/' + encodeURIComponent(doc._id);
        link.className = 'wiki-index-link' + (isActive ? ' active' : '');
        link.textContent = doc.title || doc._id;

        itemDiv.appendChild(toggle);
        itemDiv.appendChild(link);
        li.appendChild(itemDiv);

        // Children container
        if (hasChildren) {
          const childrenUl = document.createElement('ul');
          childrenUl.className = 'wiki-index-children';

          // Auto-expand Home and any ancestor of current doc
          if (doc._id === 'Home') {
            childrenUl.classList.add('expanded');
            toggle.textContent = '▼';
          }

          // Create new ancestor set for children
          const childAncestors = new Set(ancestors);
          childAncestors.add(doc._id);

          children
            .sort((a, b) => (a.title || a._id).localeCompare(b.title || b._id))
            .forEach(child => {
              const childNode = renderNode(child, childAncestors);
              if (childNode) {
                childrenUl.appendChild(childNode);
              }
            });

          li.appendChild(childrenUl);

          // Toggle handler
          toggle.addEventListener('click', (e) => {
            e.preventDefault();
            const isExpanded = childrenUl.classList.toggle('expanded');
            toggle.textContent = isExpanded ? '▼' : '▶';
          });
        }

        return li;
      }

      const tree = document.createElement('ul');
      rootDocs
        .sort((a, b) => (a.title || a._id).localeCompare(b.title || b._id))
        .forEach(doc => {
          tree.appendChild(renderNode(doc));
        });

      document.getElementById('index-tree').innerHTML = '';
      document.getElementById('index-tree').appendChild(tree);

      // Auto-expand to show current document (in addition to Home)
      expandToDocument(currentDocId);
    }

    // Expand tree to show a specific document
    function expandToDocument(docId) {
      const doc = allDocs.find(d => d._id === docId);
      if (!doc) return;

      // Build path to root with cycle detection
      const path = [docId];
      const visited = new Set([docId]);
      let current = doc;

      while (current._pid && current._pid !== '' && !visited.has(current._pid)) {
        // Prevent self-reference
        if (current._pid === current._id) {
          console.warn(`[wiki] Document ${current._id} has circular _pid reference in expandToDocument`);
          break;
        }

        path.unshift(current._pid);
        visited.add(current._pid);
        current = allDocs.find(d => d._id === current._pid);
        if (!current) break;
      }

      // Expand all parents
      path.forEach(id => {
        const link = document.querySelector(`.wiki-index-link[href="${API_BASE}/${encodeURIComponent(id)}"]`);
        if (link) {
          const item = link.closest('li');
          const childrenUl = item?.querySelector('.wiki-index-children');
          const toggle = item?.querySelector('.wiki-index-toggle');
          if (childrenUl && toggle) {
            childrenUl.classList.add('expanded');
            toggle.textContent = '▼';
          }
        }
      });

      // Scroll active document into view
      const activeLink = document.querySelector('.wiki-index-link.active');
      if (activeLink) {
        activeLink.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    }

    // Load index data
    async function loadIndexData() {
      try {
        const response = await fetch(`${API_BASE}/index`);
        if (!response.ok) {
          console.warn('[wiki] Index returned', response.status);
          allDocs = [];
          return;
        }
        allDocs = await response.json();
        if (!Array.isArray(allDocs)) allDocs = [];
        renderIndexTree();
      } catch (error) {
        console.error('[wiki] Failed to load index:', error);
      }
    }

    // Load and display document
    async function loadDocument(docId) {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('viewer').style.display = 'none';
      document.getElementById('editor').classList.remove('active');
      document.getElementById('error').style.display = 'none';

      try {
        const response = await fetch(`${API_BASE}/${encodeURIComponent(docId)}`, {
          headers: { 'Accept': 'application/json' }
        });

        if (!response.ok) {
          if (response.status === 403) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error || 'You do not have access to this wiki. If you just arrived via an invite link, try refreshing the page.');
          }
          throw new Error(`Failed to load: ${response.status}`);
        }

        currentDoc = await response.json();

        // New document - server returns template with _new flag and _pid from cookie
        if (currentDoc._new) {
          showEditor();
          return;
        }

        await renderDocument();

      } catch (error) {
        showError(error.message);
      }
    }

    // Build breadcrumb trail
    function renderBreadcrumb() {
      const breadcrumb = document.getElementById('breadcrumb');

      if (!currentDoc) {
        breadcrumb.innerHTML = '';
        return;
      }

      // Build path from current doc to root
      const path = [currentDoc];
      const visited = new Set([currentDoc._id]);

      // Walk up the parent chain using the index data
      let parentId = currentDoc._pid;

      // Prevent self-reference causing infinite loop
      if (parentId === currentDoc._id) {
        console.warn(`[wiki] Document ${currentDoc._id} has circular _pid reference (points to itself)`);
        parentId = ''; // Break the loop
      }

      while (parentId && parentId !== '' && !visited.has(parentId)) {
        const parent = allDocs.find(d => d._id === parentId);
        if (!parent) break;

        path.unshift(parent);
        visited.add(parent._id);
        parentId = parent._pid;

        // Additional safety: prevent parent from pointing to itself
        if (parentId === parent._id) {
          console.warn(`[wiki] Document ${parent._id} has circular _pid reference (points to itself)`);
          break;
        }
      }

      // Always prepend Home if we're not already on Home and Home exists
      const home = allDocs.find(d => d._id === 'Home');
      if (currentDoc._id !== 'Home' && home && path[0]._id !== 'Home') {
        path.unshift(home);
      }

      // Render breadcrumb
      const parts = path.map((doc, i) => {
        if (i === path.length - 1) {
          // Last item (current page) - no link
          return `<span>${escapeHtml(doc.title || doc._id)}</span>`;
        } else {
          return `<a href="${API_BASE}/${encodeURIComponent(doc._id)}">${escapeHtml(doc.title || doc._id)}</a>`;
        }
      });

      breadcrumb.innerHTML = parts.join(' <span class="wiki-breadcrumb-sep">/</span> ');
    }

    // Render document
    async function renderDocument() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('viewer').style.display = 'block';

      // Render breadcrumb
      renderBreadcrumb();

      // Update index tree to highlight current doc
      renderIndexTree();

      // Render markdown with WikiWord processing
      const markup = await initMarkup();
      const html = await markup.render(currentDoc.body || '', { _pid: currentDoc._pid });
      const contentEl = document.getElementById('doc-content');
      contentEl.innerHTML = html;

      // Post-process for Mermaid diagrams
      await markup.renderMermaidDiagrams(contentEl);

      // Meta
      let meta = [];
      if (currentDoc._modified) {
        const date = new Date(currentDoc._modified);
        const day = new Intl.DateTimeFormat('en-US').format(date)
        meta.push(`<a title='last modified, ${date.toLocaleString()} GMT' id='modified-tag' href='https://zebratime.org'>Modified: ${day}, ${ZebraTime(date)}</a>`);
      }
      if (currentDoc.visibility && currentDoc.visibility !== 'default' && currentDoc.visibility !== 'public') {
        const label = currentDoc.visibility === 'private' ? 'Private' : `List: ${currentDoc.visibility}`;
        meta.push('Visibility: ' + label);
      }
      document.getElementById('doc-meta').innerHTML = meta.join(' | ');

      document.getElementById('edit-btn-header').style.display = currentDoc.__permissions.edit?'inline-block':'none';
      document.getElementById('admin-btn-header').style.display = currentDoc.__permissions.admin?'inline-block':'none';
    }

    // Show editor
    async function showEditor() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('viewer').style.display = 'none';
      document.getElementById('viewer').classList.add('hidden');
      document.getElementById('editor').classList.add('active');

      document.getElementById('edit-doc-id').textContent = currentDoc._id;
      document.getElementById('edit-title').value = currentDoc.title || currentDoc._id;
      populateVisibilitySelector(currentDoc.visibility);

      // Initialize ACE editor and set content
      await initAceEditor();
      aceEditor.setValue(currentDoc.body || '', -1); // -1 moves cursor to start
      aceEditor.focus();

      // Expand tree to show parent (for new documents)
      if (currentDoc._pid) {
        expandToDocument(currentDoc._pid);
      }

      // Populate parent dropdown
      const parentSelect = document.getElementById('edit-parent');
      const rootOption = document.createElement('option');
      rootOption.value = '';
      rootOption.textContent = '(Root level)';
      rootOption.selected = !currentDoc._pid || currentDoc._pid === '';
      parentSelect.innerHTML = '';
      parentSelect.appendChild(rootOption);

      allDocs
        .filter(d => d._id !== currentDoc._id) // Don't allow setting self as parent
        .sort((a, b) => (a.title || a._id).localeCompare(b.title || b._id))
        .forEach(doc => {
          const option = document.createElement('option');
          option.value = doc._id;
          option.textContent = doc.title || doc._id;
          option.selected = doc._id === currentDoc._pid;
          parentSelect.appendChild(option);
        });

      // Force the select to update its value
      if (currentDoc._pid) {
        parentSelect.value = currentDoc._pid;
      }
    }

    // Hide editor
    function hideEditor() {
      document.getElementById('editor').classList.remove('active');
      document.getElementById('viewer').classList.remove('hidden');
      document.getElementById('viewer').style.display = 'block';
    }

    // Save document
    async function saveDocument() {
      const doc = {
        title: document.getElementById('edit-title').value,
        body: aceEditor ? aceEditor.getValue() : '',
        _pid: document.getElementById('edit-parent').value,
        visibility: document.getElementById('edit-visibility').value
      };

      try {
        const response = await fetch(`${API_BASE}/${encodeURIComponent(currentDoc._id)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(doc)
        });

        if (!response.ok) {
          const error = await response.json().catch(() => ({}));

          // Check if it's a permission error
          if (response.status === 403) {
            throw new Error(error.error || 'You need permission to edit this wiki');
          }

          throw new Error(error.error || `Save failed: ${response.status}`);
        }

        currentDoc = await response.json();
        hideEditor();
        await renderDocument();

        // Reload index to reflect new document
        await loadIndexData();

      } catch (error) {
        showError('Save failed: ' + error.message);
      }
    }


    // Show error
    function showError(message) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').textContent = message;
      document.getElementById('error').style.display = 'block';
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Event listeners
    document.getElementById('edit-btn-header').addEventListener('click', showEditor);
    document.getElementById('cancel-btn').addEventListener('click', () => {
      if (currentDoc._new) {
        window.location.href = API_BASE + '/Home';
      } else {
        hideEditor();
      }
    });
    document.getElementById('save-btn').addEventListener('click', saveDocument);

    // --- File Picker ---
    const FILES_BASE = '/agent/epistery/files';
    let fpFolder = '';
    let fpSelectedId = null;
    let fpSelectedName = '';

    function openFilePicker() {
      fpFolder = '';
      fpSelectedId = null;
      fpSelectedName = '';
      document.getElementById('fp-selected-name').textContent = '';
      document.getElementById('fp-insert-btn').disabled = true;
      document.getElementById('fp-overlay').classList.add('active');
      loadPickerFiles('');
    }

    function closeFilePicker() {
      document.getElementById('fp-overlay').classList.remove('active');
    }

    async function loadPickerFiles(folder) {
      fpFolder = folder;
      fpSelectedId = null;
      fpSelectedName = '';
      document.getElementById('fp-selected-name').textContent = '';
      document.getElementById('fp-insert-btn').disabled = true;

      // Breadcrumb
      const bcEl = document.getElementById('fp-breadcrumb');
      const parts = folder ? folder.split('/') : [];
      let bc = '<a onclick="event.preventDefault()" data-fp-nav="">/ root</a>';
      let cumulative = '';
      for (const p of parts) {
        cumulative = cumulative ? cumulative + '/' + p : p;
        bc += ' / <a onclick="event.preventDefault()" data-fp-nav="' + cumulative + '">' + p + '</a>';
      }
      bcEl.innerHTML = bc;

      // Attach breadcrumb click handlers
      bcEl.querySelectorAll('a[data-fp-nav]').forEach(a => {
        a.addEventListener('click', () => loadPickerFiles(a.getAttribute('data-fp-nav')));
      });

      const body = document.getElementById('fp-body');
      body.innerHTML = '<div class="fp-empty">Loading...</div>';

      try {
        const resp = await fetch(`${FILES_BASE}/api/list?folder=${encodeURIComponent(folder)}`);
        const data = await resp.json();

        body.innerHTML = '';

        // Folders
        if (data.folders) {
          for (const f of data.folders) {
            const el = document.createElement('div');
            el.className = 'fp-item';
            el.innerHTML = `<div class="fp-item-thumb"><span class="fp-icon">&#x1F4C1;</span></div><div class="fp-item-name">${escapeHtml(f.name)}</div>`;
            el.addEventListener('dblclick', () => loadPickerFiles(f.path));
            el.addEventListener('click', () => loadPickerFiles(f.path));
            body.appendChild(el);
          }
        }

        // Files
        const imageTypes = ['image/jpeg','image/png','image/gif','image/webp','image/svg+xml','image/bmp','image/tiff'];
        if (data.files) {
          for (const file of data.files) {
            const isImage = imageTypes.includes(file.mimetype);
            const el = document.createElement('div');
            el.className = 'fp-item' + (isImage ? '' : ' disabled');

            if (isImage) {
              const thumbUrl = `${FILES_BASE}/api/file/${file.id}/preview?w=200&h=200&fit=cover`;
              el.innerHTML = `<div class="fp-item-thumb"><img src="${thumbUrl}" alt="${escapeHtml(file.name)}" loading="lazy"></div><div class="fp-item-name">${escapeHtml(file.name)}</div>`;
              el.addEventListener('click', () => fpSelect(el, file.id, file.name));
              el.addEventListener('dblclick', () => { fpSelect(el, file.id, file.name); fpInsert(); });
            } else {
              el.innerHTML = `<div class="fp-item-thumb"><span class="fp-icon">&#x1F4C4;</span></div><div class="fp-item-name">${escapeHtml(file.name)}</div>`;
            }

            body.appendChild(el);
          }
        }

        if (!body.children.length) {
          body.innerHTML = '<div class="fp-empty">No files in this folder</div>';
        }
      } catch (err) {
        body.innerHTML = '<div class="fp-empty">Failed to load files</div>';
        console.error('[wiki] File picker load error:', err);
      }
    }

    function fpSelect(el, fileId, fileName) {
      // Deselect previous
      document.querySelectorAll('.fp-item.selected').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      fpSelectedId = fileId;
      fpSelectedName = fileName;
      document.getElementById('fp-selected-name').textContent = fileName;
      document.getElementById('fp-insert-btn').disabled = false;
    }

    function fpInsert() {
      if (!fpSelectedId || !aceEditor) return;
      const size = document.getElementById('fp-size').value;
      let url = `${FILES_BASE}/api/file/${fpSelectedId}/preview`;
      if (size) url += `?w=${size}`;
      const alt = fpSelectedName.replace(/\.[^.]+$/, '');
      const md = `![${alt}](${url})`;
      aceEditor.session.insert(aceEditor.getCursorPosition(), md);
      closeFilePicker();
      aceEditor.focus();
    }

    // File picker event listeners
    document.getElementById('image-btn').addEventListener('click', openFilePicker);
    document.getElementById('fp-close').addEventListener('click', closeFilePicker);
    document.getElementById('fp-insert-btn').addEventListener('click', fpInsert);
    document.getElementById('fp-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('fp-overlay')) closeFilePicker();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('fp-overlay').classList.contains('active')) {
        closeFilePicker();
      }
    });

    // Move wiki index between sidebar and header-sidebar-content (mobile slot) based on screen size
    function moveWikiIndex() {
      const wikiIndex = document.querySelector('.wiki-index');
      const mobileSlot = document.getElementById('header-sidebar-content');
      const consoleSidebar = document.querySelector('.console-sidebar');

      if (!wikiIndex || !mobileSlot || !consoleSidebar) return;

      const isMobile = window.matchMedia('(max-width: 1024px)').matches;
      const isInMobileSlot = mobileSlot.contains(wikiIndex);

      if (isMobile && !isInMobileSlot) {
        mobileSlot.appendChild(wikiIndex);
      } else if (!isMobile && isInMobileSlot) {
        consoleSidebar.appendChild(wikiIndex);
      }
    }

    // header.html widget dispatches 'header-ready' when the side-bar is in the DOM
    document.addEventListener('header-ready', () => {
      moveWikiIndex();
      window.matchMedia('(max-width: 1024px)').addEventListener('change', moveWikiIndex);
    }, { once: true });

    // Wait for common.js to finish session setup (key exchange sets _epistery cookie).
    // Without this, API calls can race ahead of the session and get 403.
    function waitForEpistery(timeout = 5000) {
      if (window.epistery) return Promise.resolve();
      return new Promise(resolve => {
        const timer = setTimeout(resolve, timeout);
        document.addEventListener('epistery-ready', () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
      });
    }

    // Initial load
    (async () => {
      await waitForEpistery();
      await loadAclLists();
      await loadIndexData();
      await loadDocument(getDocId());
      // Auto-print if ?print param present (used by admin Print button)
      if (new URLSearchParams(window.location.search).has('print')) {
        window.print();
      }
    })();
  </script>
</body>
</html>
